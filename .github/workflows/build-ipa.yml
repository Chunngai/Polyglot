name: Build iOS IPA (For Personal Phone)
on:
  workflow_dispatch:    # 手动点一下就构建

jobs:
  build:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      # 修复 Bundler 版本不兼容问题
      - name: Setup Ruby & Bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-version: '2.4.22'

      # 直接用官方安全方式构建（不用你那个有bug的第三方action）
      - name: Build iOS Development IPA
        run: |
          cd ${{ github.workspace }}
          
          # 安装依赖
          pod install
          
          # 构建（自动签名，直接装你手机）
          xcodebuild -workspace Polyglot.xcworkspace \
                     -scheme Polyglot \
                     -configuration Release \
                     -destination 'generic/platform=iOS' \
                     -archivePath Polyglot.xcarchive \
                     clean archive CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
          
          # 导出 IPA
          xcodebuild -exportArchive \
                     -archivePath Polyglot.xcarchive \
                     -exportPath ./build \
                     -exportOptionsPlist <(echo '{"method":"development"}')
          
          mv build/Polyglot.ipa Polyglot-Dev.ipa

      # 上传 IPA 供你下载
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Polyglot-Dev
          path: Polyglot-Dev.ipa
